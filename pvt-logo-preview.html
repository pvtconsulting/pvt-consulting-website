<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PVT Logo Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; }
  .section { min-height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 40px; position: relative; }
  .dark { background: #09090b; }
  .light { background: #f0f4f8; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; position: absolute; top: 24px; }
  .ld { color: #334155; } .ll { color: #94a3b8; }
</style>
</head>
<body>
<div class="section dark">
  <div class="label ld">DARK BACKGROUND</div>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130">
    <defs>
      <linearGradient id="blk" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#0c1a2e"/></linearGradient>
      <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#38bdf8"/><stop offset="100%" style="stop-color:#0ea5e9"/></linearGradient>
    </defs>
    <rect x="0" y="0" width="158" height="130" fill="url(#blk)"/>
    <polygon points="138,0 158,0 158,20" fill="#38bdf8" opacity="0.25"/>
    <text x="79" y="88" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="68" font-weight="900" fill="#f8fafc" text-anchor="middle" letter-spacing="2">PVT</text>
    <rect x="0" y="0" width="158" height="3" fill="url(#sky)" opacity="0.7"/>
    <line x1="178" y1="18" x2="178" y2="112" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="198" y="70" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="38" font-weight="800" fill="#f1f5f9" letter-spacing="5">CONSULTING</text>
    <rect x="198" y="82" width="310" height="2.5" rx="1.25" fill="url(#sky)"/>
    <text x="199" y="105" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="300" fill="#475569" letter-spacing="4">STRATEGY · TECHNOLOGY · RESULTS</text>
  </svg>
</div>
<div class="section light">
  <div class="label ll">LIGHT BACKGROUND</div>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130">
    <defs>
      <linearGradient id="blk2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#0c1a2e"/></linearGradient>
      <linearGradient id="sky2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#0284c7"/><stop offset="100%" style="stop-color:#0369a1"/></linearGradient>
    </defs>
    <rect x="0" y="0" width="158" height="130" fill="url(#blk2)"/>
    <polygon points="138,0 158,0 158,20" fill="#0284c7" opacity="0.3"/>
    <text x="79" y="88" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="68" font-weight="900" fill="#f8fafc" text-anchor="middle" letter-spacing="2">PVT</text>
    <rect x="0" y="0" width="158" height="3" fill="url(#sky2)" opacity="0.7"/>
    <line x1="178" y1="18" x2="178" y2="112" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="198" y="70" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="38" font-weight="800" fill="#0f172a" letter-spacing="5">CONSULTING</text>
    <rect x="198" y="82" width="310" height="2.5" rx="1.25" fill="url(#sky2)"/>
    <text x="199" y="105" font-family="'Inter','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="300" fill="#94a3b8" letter-spacing="4">STRATEGY · TECHNOLOGY · RESULTS</text>
  </svg>
</div>
</body>
</html>
